version: 2.1
jobs:
  bootstrap-build:
    docker:
      - image: codesmithy/gcc-bootstrap-build-prerequisites:0.13.0
    steps:
      - run: 
          name: "Set CODESMITHYIDE_ROOT environment variables"
          command: echo 'export CODESMITHYIDE_ROOT="/workspace/projects/codesmithyide"' >> $BASH_ENV
      - checkout:
          path: /workspace/projects/codesmithyide/nuime
      - run:
          name: Build
          command: cd /workspace/projects/codesmithyide/nuime/library/build-files/gnumake && make
      - run:
          name: "Test"
          command: cd /workspace/projects/codesmithyide/nuime/library/tests/build-files/gnumake && make && ./nuime_lib_tests
      - run:
          name: Build
          command: cd /workspace/projects/codesmithyide/nuime/cli/build-files/gnumake && make
      - run:
          name: "Test"
          command: cd /workspace/projects/codesmithyide/nuime/cli/tests/build-files/gnumake && make && ./nuime_cli_tests
      - store_artifacts:
          path: /workspace/projects/codesmithyide/nuime/bin/nuime
  build:
    docker:
      - image: codesmithy/gcc-build-prerequisites:0.17.0
    steps:
      - run:
          name: "Set CODESMITHYIDE_ROOT environment variables"
          command: echo 'export CODESMITHYIDE_ROOT="/workspace/projects//codesmithyide"' >> $BASH_ENV
      - checkout:
          path: /workspace/projects/codesmithyide/nuime
      - run:
          name: Build
          command: cd /workspace/projects/codesmithyide/nuime/library/build-files/gnumake && make
      - run:
          name: "Test"
          command: cd /workspace/projects/codesmithyide/nuime/library/tests/build-files/gnumake && make && ./nuime_lib_tests
      - run:
          name: Build
          command: cd /workspace/projects/codesmithyide/nuime/cli/build-files/gnumake && make
      - run:
          name: "Test"
          command: cd /workspace/projects/codesmithyide/nuime/cli/tests/build-files/gnumake && make && ./nuime_cli_tests
      - store_artifacts:
          path: /workspace/projects/codesmithyide/nuime/bin/nuime
workflows:
  version: 2
  continuous_build:
    jobs:
      - bootstrap-build
      - build
  weekly_build:
    jobs:
      - bootstrap-build
      - build
    triggers:
      - schedule:
          cron: "0 8 * * 0"
          filters:
            branches:
              only:
                 - main
